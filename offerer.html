<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebRTC Fragmented Data Channel MRE - Offerer</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      body { margin: 0; padding: 24px; line-height: 1.4; }
      main { max-width: 1100px; margin: 0 auto; display: grid; gap: 16px; }
      h1 { margin: 0; font-size: 1.6rem; }
      nav { display: flex; flex-wrap: wrap; gap: 12px; }
      a { color: inherit; }
      section { display: grid; gap: 8px; }
      label { font-weight: 700; }
      input, select, textarea, pre, output { box-sizing: border-box; width: 100%; border: 1px solid #8886; border-radius: 6px; padding: 10px; font: 13px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace; }
      textarea { min-height: 150px; resize: vertical; }
      pre { min-height: 280px; max-height: 420px; overflow: auto; white-space: pre-wrap; }
      output { display: block; min-height: 42px; overflow-wrap: anywhere; }
      button { width: max-content; padding: 8px 12px; border-radius: 6px; border: 1px solid #5558; font: inherit; cursor: pointer; }
      button:disabled { cursor: wait; opacity: 0.65; }
      .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
      .controls label { display: grid; gap: 6px; min-width: 180px; }
      .option { display: flex; gap: 8px; align-items: center; font-weight: 400; }
      .option input { width: 18px; height: 18px; }
      .ip-field { min-width: 170px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; align-items: start; }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <a href="./answerer.html">Answerer</a>
        <a href="./rust-offerer.html">Rust Sender Control</a>
      </nav>
      <h1>Offerer: WebRTC fragmented data channel MRE</h1>
      <output id="status">Idle.</output>

      <div class="controls">
        <label>Room
          <input id="room" value="mre" autocomplete="off" spellcheck="false">
        </label>
        <label class="ip-field">Advertise sender IP
          <input id="advertiseIp" autocomplete="off" spellcheck="false" placeholder="auto">
        </label>
        <label class="option">
          <input id="rewriteMdns" type="checkbox" checked>
          Replace .local ICE names with IPs
        </label>
        <label class="option">
          <input id="useStun" type="checkbox">
          Use public STUN for connectivity test
        </label>
        <label>Payload mode
          <select id="payloadMode">
            <option value="p2claw" selected>p2claw frames</option>
            <option value="raw">raw labeled messages</option>
          </select>
        </label>
        <label>Pairs
          <input id="pairs" type="number" min="1" max="200" value="4">
        </label>
        <label>Response bytes
          <input id="responseSize" type="number" min="23" max="2000000" value="220">
        </label>
        <label>Body bytes
          <input id="bodySize" type="number" min="1" max="2000000" value="8192">
        </label>
        <label>Tail bytes
          <input id="tailSize" type="number" min="0" max="2000000" value="100">
        </label>
        <button id="start">Start sender</button>
      </div>

      <div class="grid">
        <section>
          <label for="offer">Published offer</label>
          <textarea id="offer" readonly spellcheck="false"></textarea>
        </section>

        <section>
          <label for="answer">Received answer</label>
          <textarea id="answer" readonly spellcheck="false"></textarea>
        </section>
      </div>

      <section>
        <label for="currentStats">Current stats</label>
        <output id="currentStats">No stats yet.</output>
      </section>

      <section>
        <label for="log">Trace log</label>
        <pre id="log"></pre>
      </section>

      <section>
        <label for="statsDump">Filtered getStats() JSON</label>
        <textarea id="statsDump" readonly spellcheck="false"></textarea>
      </section>
    </main>

    <script type="module">
      import {
        attachP2clawResponder,
        attachReceiver,
        chooseAdvertiseIp,
        clearSignal,
        createPeerConnection,
        createSessionId,
        getSignalInfo,
        logger,
        putSendOptions,
        putSignal,
        rewriteMdnsHostCandidates,
        sendTestMessages,
        setStatus,
        startStats,
        stringifyDescription,
        waitForIceGatheringComplete,
        waitForSignalMatch,
      } from "./shared.js?v=24";

      const els = {
        advertiseIp: document.querySelector("#advertiseIp"),
        answer: document.querySelector("#answer"),
        currentStats: document.querySelector("#currentStats"),
        log: document.querySelector("#log"),
        offer: document.querySelector("#offer"),
        payloadMode: document.querySelector("#payloadMode"),
        pairs: document.querySelector("#pairs"),
        responseSize: document.querySelector("#responseSize"),
        bodySize: document.querySelector("#bodySize"),
        tailSize: document.querySelector("#tailSize"),
        rewriteMdns: document.querySelector("#rewriteMdns"),
        room: document.querySelector("#room"),
        start: document.querySelector("#start"),
        statsDump: document.querySelector("#statsDump"),
        status: document.querySelector("#status"),
        useStun: document.querySelector("#useStun"),
      };

      const log = logger(els.log);
      let pc;
      let sent = false;
      let sentCount = 0;
      const sentLabels = new Set();

      initAdvertiseIp();
      els.start.addEventListener("click", startSender);

      async function startSender() {
        els.start.disabled = true;
        resetPage();
        const room = roomName();

        try {
          await clearSignal(room);
          log("signal", `cleared room ${room}`);
          const sessionId = createSessionId("browser");
          await putSignal(room, "session", { id: sessionId, sender: "browser", createdAt: Date.now() });
          log("signal", `published session ${sessionId}`);
          const options = { ...sendOptions(), sessionId };
          await putSendOptions(room, options);
          log(
            "signal",
            `published send-options session=${sessionId} mode=${options.payloadMode} pairs=${options.pairs} response=${options.responseSize} body=${options.bodySize} tail=${options.tailSize}`,
          );

          pc = createPeerConnection(log, { useStun: els.useStun.checked });
          const dc = pc.createDataChannel("p2claw", { ordered: true });
          dc.binaryType = "arraybuffer";
          attachDataChannelLogging(dc, options);
          attachReceiver(dc, log);
          if (options.payloadMode === "p2claw") {
            attachP2clawResponder(dc, log, options, noteSent);
          }
          startStats(pc, log, els.currentStats, els.statsDump);

          log("step", "creating offer");
          await pc.setLocalDescription(await pc.createOffer());
          els.offer.value = stringifyDescription(pc.localDescription);
          setStatus(els.status, "Offer created. Waiting briefly for ICE candidates.");

          const iceResult = await waitForIceGatheringComplete(pc, 5000);
          let offer = { type: pc.localDescription.type, sdp: pc.localDescription.sdp };
          if (els.rewriteMdns.checked) {
            offer = rewriteMdnsHostCandidates(offer, els.advertiseIp.value.trim(), log);
          }
          els.offer.value = stringifyDescription(offer);
          await putSignal(room, "offer", offer);
          log("signal", `published offer after ICE ${iceResult}`);
          setStatus(els.status, "Offer published. Waiting for receiver answer.");

          const answer = await waitForSignalMatch(
            room,
            "answer",
            log,
            (value) => value?.mreSession === sessionId,
          );
          els.answer.value = stringifyDescription(answer);
          await pc.setRemoteDescription({ type: answer.type, sdp: answer.sdp });
          setStatus(els.status, "Answer applied. Waiting for the data channel to open.");
        } catch (error) {
          log("error", error.stack || error.message);
          setStatus(els.status, error.message);
        } finally {
          els.start.disabled = false;
        }
      }

      function attachDataChannelLogging(channel, options) {
        channel.addEventListener("open", async () => {
          log("dc", `open label=${channel.label} id=${channel.id}`);
          if (options.payloadMode === "p2claw") {
            setStatus(els.status, "Data channel open. Waiting for p2claw requests from receiver.");
            return;
          }

          setStatus(els.status, "Data channel open. Sending raw test messages.");
          if (!sent) {
            sent = true;
            await sendTestMessages(channel, log, noteSent, options);
            setStatus(els.status, `Sent ${sentCount} browser message(s): ${Array.from(sentLabels).join(", ")}`);
          }
        });
        channel.addEventListener("close", () => log("dc", "close"));
        channel.addEventListener("error", (event) => log("dc", event.error?.message || "error"));
      }

      function resetPage() {
        if (pc) pc.close();
        pc = null;
        sent = false;
        sentCount = 0;
        sentLabels.clear();
        els.answer.value = "";
        els.offer.value = "";
        els.log.textContent = "";
        els.statsDump.value = "";
        els.currentStats.textContent = "No stats yet.";
      }

      function noteSent(item) {
        sentCount += 1;
        sentLabels.add(item.label);
        setStatus(els.status, `Sent ${sentCount} browser message(s): ${Array.from(sentLabels).join(", ")}`);
      }

      function sendOptions() {
        return {
          payloadMode: els.payloadMode.value,
          pairs: numberValue(els.pairs),
          responseSize: numberValue(els.responseSize),
          bodySize: numberValue(els.bodySize),
          tailSize: numberValue(els.tailSize),
        };
      }

      function numberValue(input) {
        return Number.parseInt(input.value, 10);
      }

      async function initAdvertiseIp() {
        try {
          const info = await getSignalInfo();
          const ip = chooseAdvertiseIp(info, "offerer");
          els.advertiseIp.value = ip;
          log("signal", `advertise sender IP default=${ip || "none"}`);
        } catch (error) {
          log("error", error.message);
        }
      }

      function roomName() {
        return els.room.value.trim() || "mre";
      }
    </script>
  </body>
</html>
